server:
  port: 8080

cosh:
  node:
    max-size: 1000
    netty-port: 7070      # Netty binary transport port (CBP/1)

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    export:
      prometheus:
        enabled: true

spring:
  application:
    name: cosh-grid-node
